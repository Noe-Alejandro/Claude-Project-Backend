name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Run every Monday at 08:00 UTC to catch newly disclosed vulnerabilities
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  vulnerable-packages:
    name: Check for vulnerable NuGet packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Restore dependencies
        run: dotnet restore ClaudeProjectBackend.sln

      - name: Check for vulnerable packages
        run: >
          dotnet list ClaudeProjectBackend.sln package
          --vulnerable
          --include-transitive
          2>&1 | tee vulnerable.txt
          && grep -q "no vulnerable packages" vulnerable.txt

  outdated-packages:
    name: Check for outdated NuGet packages
    runs-on: ubuntu-latest
    # Informational only — does not fail the pipeline
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Restore dependencies
        run: dotnet restore ClaudeProjectBackend.sln

      - name: List outdated packages
        run: dotnet list ClaudeProjectBackend.sln package --outdated
