name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Restore dependencies
        run: dotnet restore ClaudeProjectBackend.sln

      - name: Build solution
        run: dotnet build ClaudeProjectBackend.sln --no-restore --configuration Release

      - name: Run tests with coverage
        run: >
          dotnet test ClaudeProjectBackend.sln
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/
          retention-days: 7
